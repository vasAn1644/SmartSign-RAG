name: Python App CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: CI Step: Verify App Structure
        run: |
          echo "Перевірка наявності головного файлу..."
          if [ -f "ui/app.py" ]; then
            echo "app.py знайдено, структура проєкту коректна."
          else
            echo "ПОМИЛКА: app.py не знайдено!"
            exit 1
          fi

      - name: CD Step: Prepare Artifacts
        run: |
          mkdir -p release
          if [ -d "ui" ]; then
            cp -r ui/* release/
          fi
          echo "Збірка підготовлена до деплою." > release/build_info.txt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartSign-Ready-to-Deploy
          path: release/
